<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir al Archivo</title>
  <link rel="stylesheet" href="../styles/archivo-upload.css">
</head>
<body>
  <!-- Password gate -->
  <div id="pw-overlay">
    <div id="pw-window">
      <div id="pw-titlebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="3" y="7" width="10" height="8" rx="1" fill="#ECE9D8" stroke="#808080" stroke-width="1"/>
          <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="#ECE9D8" stroke-width="1.2" fill="none"/>
          <circle cx="8" cy="11" r="1.2" fill="#316AC5"/>
        </svg>
        Acceso restringido
      </div>
      <div id="pw-body">
        <div class="xp-field">
          <label class="xp-label" for="pw-input">Contraseña</label>
          <input class="xp-input" type="password" id="pw-input"
                 autocomplete="current-password" maxlength="80">
        </div>
        <div id="pw-error"></div>
        <div class="btn-row" style="margin-top:0">
          <button class="xp-btn xp-btn-primary" type="button" id="pw-submit">Entrar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="xp-window">
    <div class="xp-titlebar">
      <div class="xp-titlebar-left">
        <!-- Folder icon -->
        <svg class="xp-titlebar-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M1 3v10h14V5H7L6 3z" fill="#FED84F" stroke="#808080" stroke-width=".7"/>
          <path d="M1 5h14v8H1z" fill="#FEE88A" stroke="#808080" stroke-width=".3"/>
        </svg>
        Subir al Archivo GDN
      </div>
    </div>
    <div class="xp-body">

      <div class="xp-field">
        <label class="xp-label" for="input-artista">Artista</label>
        <input class="xp-input" type="text" id="input-artista"
               placeholder="Ej: Tu nombre o @handle"
               autocomplete="off" maxlength="120" list="artistas-list">
        <datalist id="artistas-list"></datalist>
      </div>

      <div class="xp-field">
        <label class="xp-label" for="input-descripcion">Descripción <span style="font-weight:normal;color:#666">(opcional)</span></label>
        <textarea class="xp-input" id="input-descripcion" rows="3"
                  placeholder="Dónde, cuándo, qué..." maxlength="400"
                  style="resize:vertical"></textarea>
      </div>

      <div class="xp-field">
        <label class="xp-label" for="input-fecha">Fecha <span style="font-weight:normal;color:#666">(opcional)</span></label>
        <input class="xp-input" type="date" id="input-fecha">
      </div>

      <hr class="xp-divider">

      <div class="xp-field">
        <span class="xp-label">Imágenes</span>
        <div id="upload-zone" role="button" tabindex="0" aria-label="Seleccionar o arrastrar imágenes">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
            <rect x="3" y="9" width="30" height="22" rx="1" fill="#FED84F" stroke="#808080" stroke-width="1"/>
            <rect x="3" y="9" width="30" height="3" fill="#3A6EA5" stroke="#808080" stroke-width="1"/>
            <path d="M13 24 l5-7 l5 7" fill="#316AC5" opacity=".7"/>
            <circle cx="22" cy="19" r="2" fill="#316AC5" opacity=".7"/>
          </svg>
          <p>Arrastra imágenes aquí o haz clic para seleccionar</p>
          <small>JPG, PNG, GIF, WEBP · máx 10 MB por archivo</small>
        </div>
        <input id="file-input" type="file" accept="image/*" multiple
               style="display:none" aria-hidden="true">
      </div>

      <div id="file-list" style="display:none"></div>
      <div id="upload-counter" style="display:none"></div>

      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>

      <div id="status-box" role="status" aria-live="polite"></div>

      <p class="note">
        Las imágenes se subirán al archivo colectivo de GDN.<br>
        La galería se actualizará automáticamente en unos minutos.
      </p>

      <div class="btn-row">
        <button class="xp-btn" type="button" id="btn-cancel">Cancelar</button>
        <button class="xp-btn xp-btn-primary" type="button" id="btn-upload" disabled>Subir</button>
      </div>
    </div>
  </div>
  <script src="../scripts/archivo-upload.js" defer></script>
</body>
</html>
