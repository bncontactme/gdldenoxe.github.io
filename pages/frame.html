<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#008080">
    <title>GDLDENOXE</title>
    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="../styles/frame.css">
    <link rel="stylesheet" href="../styles/torta-modal.css">
</head>
<body>
    <div class="win95-frame">
        <div class="title-bar">
            <div class="title-bar-left">
                <img id="frame-icon" src="" alt="">
                <span id="frame-title">Cargando...</span>
            </div>
            <div class="title-bar-controls">
                <button onclick="window.location.href='../index.html'">✕</button>
            </div>
        </div>
        <div class="frame-content" id="frame-content">
            <iframe id="frame-iframe" src="" style="display:none;"></iframe>
        </div>
    </div>

    <!-- Upload popup — rendered at parent level via postMessage from archivo iframe -->
    <div id="upload-frame-popup" class="upload-popup-overlay">
        <div class="upload-popup-window">
            <div class="upload-popup-titlebar">
                <span>Subir fotos al archivo</span>
                <button id="upload-frame-close" class="upload-popup-close">✕</button>
            </div>
            <iframe id="upload-frame-iframe" class="upload-popup-iframe" src="" frameborder="0" title="Subir fotos"></iframe>
        </div>
    </div>

    <script src="../scripts/frame.js" defer></script>
    <script src="../scripts/torta-modal.js" defer></script>
</body>
</html>
