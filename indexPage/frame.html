<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#008080">
    <title>GDLDENOXE</title>
    <style>
        :root {
            --win95-gray: #c0c0c0;
            --win95-dark-gray: #808080;
            --win95-light-gray: #dfdfdf;
            --win95-blue: #000080;
            --win95-blue-light: #1084d0;
            --win95-teal: #008080;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'MS Sans Serif', 'Microsoft Sans Serif', Arial, sans-serif;
            background: var(--win95-teal);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .win95-frame {
            background: var(--win95-gray);
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #000;
            border-bottom: 2px solid #000;
            box-shadow: inset 1px 1px 0 var(--win95-light-gray), inset -1px -1px 0 var(--win95-dark-gray);
            margin: 6px;
            height: calc(100vh - 12px);
            height: calc(100dvh - 12px);
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: linear-gradient(to right, var(--win95-blue), var(--win95-blue-light));
            color: #fff;
            padding: 3px 4px 3px 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
            min-height: 22px;
        }

        .title-bar-left {
            display: flex;
            align-items: center;
            gap: 4px;
            overflow: hidden;
        }

        .title-bar-left img {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .title-bar-left span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .title-bar-controls button {
            background: var(--win95-gray);
            border-top: 1px solid #fff;
            border-left: 1px solid #fff;
            border-right: 1px solid #000;
            border-bottom: 1px solid #000;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .title-bar-controls button:active {
            border-top: 1px solid #000;
            border-left: 1px solid #000;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
        }

        .title-bar-controls button:hover {
            background: #d0d0d0;
        }

        .frame-content {
            flex: 1;
            border-top: 2px solid var(--win95-dark-gray);
            border-left: 2px solid var(--win95-dark-gray);
            border-right: 2px solid var(--win95-light-gray);
            border-bottom: 2px solid var(--win95-light-gray);
            margin: 2px 3px 3px;
            overflow: hidden;
            background: #fff;
        }

        .frame-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Tienda debug placeholder */
        #tienda-placeholder {
            width: 100%;
            height: 100%;
            background: #c0c0c0;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #dfdfdf;
            border-bottom: 2px solid #dfdfdf;
            box-shadow: inset 1px 1px 0 #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #tienda-placeholder img {
            width: 100px;
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* Tablet */
        @media (max-width: 1024px) {
            .win95-frame {
                margin: 4px;
                height: calc(100vh - 8px);
                height: calc(100dvh - 8px);
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .win95-frame {
                margin: 4px;
                height: calc(100vh - 8px);
                height: calc(100dvh - 8px);
                box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080,
                            2px 2px 0 rgba(0,0,0,0.15);
            }

            .title-bar {
                padding: 4px 6px;
                font-size: 12px;
                min-height: 26px;
            }

            .title-bar-left img {
                width: 16px;
                height: 16px;
            }

            .title-bar-controls button {
                width: 20px;
                height: 18px;
                font-size: 12px;
            }

            .frame-content {
                margin: 2px;
            }
        }

        /* Small phones */
        @media (max-width: 400px) {
            .win95-frame {
                margin: 3px;
                height: calc(100vh - 6px);
                height: calc(100dvh - 6px);
            }

            .title-bar {
                padding: 3px 5px;
                font-size: 11px;
                min-height: 24px;
            }

            .frame-content {
                margin: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="win95-frame">
        <div class="title-bar">
            <div class="title-bar-left">
                <img id="frame-icon" src="" alt="">
                <span id="frame-title">Cargando...</span>
            </div>
            <div class="title-bar-controls">
                <button onclick="window.location.href='../index.html'">✕</button>
            </div>
        </div>
        <div class="frame-content" id="frame-content">
            <iframe id="frame-iframe" src="" style="display:none;"></iframe>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const page = params.get('p');
        const artId = params.get('id');

        const pages = {
            'galeria': {
                title: 'Galería',
                icon: 'indexImages/icons/kodak_imaging-0.png',
                src: '../archivoPage/archivoPage.html'
            },
            'tienda': {
                title: 'Tienda',
                icon: 'indexImages/icons/directory_e-0.png',
                src: '../tiendaPage/index.html'
            },
            'articulos': {
                title: 'Artículos',
                icon: 'indexImages/icons/directory_closed-0.png',
                src: '../articulosPage/index.html'
            },
            'articulo': {
                title: 'Artículo',
                icon: 'indexImages/icons/notepad_file-0.png',
                src: '../articulosPage/articulo.html?id=' + (artId || '1')
            },
            'minesweeper': {
                title: 'Buscaminas',
                icon: 'indexImages/icons/minesweeper-0.png',
                src: '../buscaminasPage/index.html'
            }
        };

        const config = pages[page];
        if (config) {
            document.title = config.title + ' - GDLDENOXE';
            document.getElementById('frame-title').textContent = config.title;
            document.getElementById('frame-icon').src = config.icon;

            if (page === 'tienda') {
                // Show placeholder; unlock after 12 taps
                const iframe      = document.getElementById('frame-iframe');
                const frameContent = document.getElementById('frame-content');

                const ph = document.createElement('div');
                ph.id = 'tienda-placeholder';
                const logo = document.createElement('img');
                logo.src = '../tiendaPage/assets/webAssets/logo/path206.png';
                logo.alt = 'GDN';
                ph.appendChild(logo);
                frameContent.insertBefore(ph, iframe);

                let taps = 0;
                let resetTimer = null;

                ph.addEventListener('click',     onTap);
                ph.addEventListener('touchstart', onTap, { passive: true });

                function onTap() {
                    clearTimeout(resetTimer);
                    taps++;
                    if (taps >= 12) {
                        iframe.src = config.src;
                        iframe.style.display = '';
                        ph.style.display = 'none';
                        taps = 0;
                        return;
                    }
                    resetTimer = setTimeout(() => { taps = 0; }, 3000);
                }
            } else {
                document.getElementById('frame-iframe').src = config.src;
                document.getElementById('frame-iframe').style.display = '';
            }
        } else {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
