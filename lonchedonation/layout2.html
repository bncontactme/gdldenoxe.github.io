<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cómprame Una Torta - GDLDENOXE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'MS Sans Serif', 'Microsoft Sans Serif', Arial, sans-serif; background: #c0c0c0; }
        .wrap { display: flex; flex-direction: column; height: 100%; }
        .gif-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gif-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
        .content { flex-shrink: 0; padding: 7px 9px 9px; display: flex; flex-direction: column; gap: 5px; }
        .title { font-size: 11px; font-weight: bold; text-align: center; }
        .btn { display: block; width: 100%; background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff; border-right: 2px solid #000; border-bottom: 2px solid #000; padding: 5px 0; font-size: 12px; font-family: 'MS Sans Serif', Arial, sans-serif; font-weight: bold; color: #000; text-align: center; cursor: pointer; }
        .btn:active { border-top: 2px solid #000; border-left: 2px solid #000; border-right: 2px solid #fff; border-bottom: 2px solid #fff; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="gif-wrap">
            <img src="../indexPage/indexImages/lonche-spin.gif" alt="Torta tapatía">
        </div>
        <div class="content">
            <div class="title">¿Te gusta nuestro contenido?</div>
            <button class="btn" id="open-modal">🌮 Cómprame Una Torta</button>
        </div>
    </div>
    <script>
        document.getElementById('open-modal').addEventListener('click', function() {
            window.parent.postMessage('open-torta-modal', '*');
        });
    </script>
</body>
</html>
