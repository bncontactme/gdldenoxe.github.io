<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#008080">
    <meta name="description" content="Tienda GDLDENOXE - Guadalajara de Noche">
    <title>GDLDENOXE - Tienda</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style id="dynamic-flipbook-css">/* Generated dynamically by catalog engine */</style>
    <script src="script.js" defer></script>
</head>

<body>
    <div id="marquee-bar">
        <div class="marquee-content">
            <span class="marquee-text">*** BIENVENIDO A LA TIENDA GDLDENOXE ***</span>
        </div>
    </div>

    <main>
        <!-- Checkboxes + #flip_book are generated dynamically from catalog.json -->
        <div id="catalog-root"></div>

        <button id="toggle-mode-btn" aria-label="Cambiar modo">
            <i class="bi bi-moon-stars-fill"></i>
        </button>

        <audio id="background-music" loop muted preload="none">
            <source src="assets/BACKGROUND WEB TIENDA MUSIC.mp3" type="audio/mpeg">
        </audio>

        <audio id="ad-audio" preload="none">
            <source src="assets/Anuncio1.mp3" type="audio/mpeg">
        </audio>
    </main>

    <!-- Product Detail Modal — 2000s Supermarket Style -->
    <div id="product-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Detalle de producto">
        <div class="modal-overlay"></div>
        <div class="modal-card">
            <button class="modal-close" aria-label="Cerrar">&times;</button>
            <div class="modal-header">
                <span class="modal-header-stars">&#9733; &#9733; &#9733;</span>
                <span class="modal-header-title">PRODUCTO</span>
                <span class="modal-header-stars">&#9733; &#9733; &#9733;</span>
            </div>
            <div class="modal-body">
                <div class="modal-image-container">
                    <div class="modal-badge"></div>
                    <img class="modal-product-image" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 class="modal-product-name"></h2>
                    <div class="modal-price-starburst">
                        <span class="modal-price-text"></span>
                    </div>
                    <p class="modal-product-description"></p>
                    <a class="modal-buy-btn" href="#" target="_blank" rel="noopener noreferrer">
                        &#161;COMPRAR AHORA!
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
