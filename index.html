                                                <!-- Brutalist minimal radio UI: only buttons, no background; moved to top-left with animated title -->

                                                    <!-- Animated marquee-like title (light sign) -->
                                                    <style>
                                                        /* slide from 0% to -50% for duplicated text to create a continuous loop; slower duration */
                                                        @keyframes slide-title { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }
                                                        #radio-title-wrap { overflow:hidden; display:inline-block; vertical-align:middle; max-width:300px; }
                                                        /* duplicate the title inside with a separator so there's always a trailing copy (no blank gap) */
                                                        #radio-title { display:inline-block; white-space:nowrap; font-size:13px; font-weight:700; letter-spacing:0.6px; color:#000; animation: slide-title 18s linear infinite; }
                                                        #radio-play, #radio-mute { background:transparent;border:2px solid #000;color:#000;padding:4px 6px;cursor:pointer;font-size:14px;font-weight:700;line-height:1;border-radius:0; }
                                                    </style>
                                                                        <span id="radio-title-wrap" aria-hidden="false">
                                                                            <span id="radio-title">Guadalajara De Noche Presenta: La movida Mexicana (Episodio 15) • Guadalajara De Noche Presenta: La movida Mexicana (Episodio 15) •</span>
                                                                        </span>
                                                    <button id="radio-play" aria-label="Play" title="Play">►</button>
                                                    <button id="radio-mute" aria-label="Mute" title="Mute">🔊</button>
                                            <audio id="site-radio" preload="none" style="display:none;">
                                                <source src="http://104.248.10.199:8000/stream.mp3" type="audio/mpeg">
                                                Your browser does not support the audio element. Visit <a href="http://104.248.10.199:8000/stream.mp3">the stream</a> to listen.
                                            </audio>
                                        </div>

                                <script>
                                    (function(){
                                        const audio = document.getElementById('site-radio');
                                        const playBtn = document.getElementById('radio-play');
                                        const muteBtn = document.getElementById('radio-mute');

                                        // Load persisted volume and muted
                                        const savedVol = localStorage.getItem('gdldenoxe_radio_volume');
                                        const savedMuted = localStorage.getItem('gdldenoxe_radio_muted');
                                        if(savedVol !== null){ audio.volume = parseFloat(savedVol); }
                                        if(savedMuted !== null){ audio.muted = savedMuted === 'true'; muteBtn.textContent = audio.muted ? '🔇' : '🔊'; }

                                        function updatePlayState(){
                                            if(audio.paused){ playBtn.textContent = '►'; playBtn.title = 'Play'; }
                                            else { playBtn.textContent = '❚❚'; playBtn.title = 'Pause'; }
                                        }

                                        // Attempt autoplay once; if blocked, user clicks will work
                                        audio.play().then(updatePlayState).catch(()=>{ updatePlayState(); });

                                                    playBtn.addEventListener('click', ()=>{
                                                        if(audio.paused){
                                                            // Force a fresh connection to avoid playing buffered audio.
                                                            // Add a cache-busting query param and reload the source before playing.
                                                            const src = audio.querySelector('source').getAttribute('src');
                                                            const sep = src.includes('?') ? '&' : '?';
                                                            const fresh = src.split('?')[0] + sep + 'cb=' + Date.now();
                                                            audio.pause();
                                                            audio.removeAttribute('src');
                                                            audio.querySelector('source').setAttribute('src', fresh);
                                                            audio.load(); // force reload
                                                            audio.play();
                                                        } else {
                                                            audio.pause();
                                                        }
                                                        updatePlayState();
                                                    });

                                        muteBtn.addEventListener('click', ()=>{
                                            audio.muted = !audio.muted;
                                            localStorage.setItem('gdldenoxe_radio_muted', audio.muted);
                                            muteBtn.textContent = audio.muted ? '🔇' : '🔊';
                                        });

                                        // save volume on change via keyboard or programmatic changes
                                        audio.addEventListener('volumechange', ()=>{
                                            localStorage.setItem('gdldenoxe_radio_volume', audio.volume);
                                        });

                                        // reflect remote play/pause
                                        audio.addEventListener('play', updatePlayState);
                                        audio.addEventListener('pause', updatePlayState);
                                    })();
                                </script>
